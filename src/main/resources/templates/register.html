<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/Login.css}">
</head>
<body>
    <div class="login-page">
        <div class="login-container" style="grid-template-columns: 1fr; max-width: 480px;">
            <div class="login-card animate-fadeInUp">
                <div class="card-icon user"><i class="fa-solid fa-user-plus"></i></div>
                <div class="card-label">Create Account</div>
                <h2>Join <span>FoodFrenzy</span></h2>
                <form th:action="@{/register}" method="post" th:object="${userRegistration}">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="uemail" name="uemail" th:field="*{uemail}" placeholder="you@email.com" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="uname" name="uname" th:field="*{uname}" placeholder="Your name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="text" id="unumber" name="unumber" th:field="*{unumber}" placeholder="10-digit number" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <input type="text" id="uaddress" name="uaddress" th:field="*{uaddress}" placeholder="Your delivery address" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="upassword" name="upassword" th:field="*{upassword}" placeholder="••••••••" class="form-input" required>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>
                </form>
                <small class="error-msg" th:if="${error}" th:text="${error}"></small>
                <div class="login-footer">
                    Already have an account? <a href="/login">Sign in here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
