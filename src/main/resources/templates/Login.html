<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Sign In</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/Login.css}">
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="login-page">
        <div class="login-container">

            <!-- Global Messages -->
            <div th:if="${param.logout}" style="grid-column: 1 / -1; text-align: center; margin-bottom: -16px;">
                <div class="badge badge-success" style="font-size: 0.9rem; padding: 10px 24px;">
                    <i class="fa-solid fa-check-circle"></i> You have been logged out successfully.
                </div>
            </div>
            <div th:if="${param.expired}" style="grid-column: 1 / -1; text-align: center; margin-bottom: -16px;">
                <div class="badge badge-warning" style="font-size: 0.9rem; padding: 10px 24px;">
                    <i class="fa-solid fa-clock"></i> Your session has expired. Please login again.
                </div>
            </div>
            <div th:if="${param.registered}" style="grid-column: 1 / -1; text-align: center; margin-bottom: -16px;">
                <div class="badge badge-success" style="font-size: 0.9rem; padding: 10px 24px;">
                    <i class="fa-solid fa-check-circle"></i> Account created successfully. You can now log in.
                </div>
            </div>

            <!-- Admin Login Card -->
            <div class="login-card animate-fadeInUp">
                <div class="card-icon admin"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="card-label">Business Portal</div>
                <h2>Admin <span>Login</span></h2>
                <form th:action="@{/adminLogin}" method="post">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" placeholder="admin@foodfrenzy.com" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" placeholder="••••••••" class="form-input" required>
                    </div>
                    <small class="error-msg" th:if="${error}" th:text="${error}"></small>
                    <button type="submit" class="btn-login">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign In as Admin
                    </button>
                </form>
            </div>

            <!-- User Login Card -->
            <div class="login-card animate-fadeInUp" style="animation-delay: 0.15s;">
                <div class="card-icon user"><i class="fa-solid fa-user"></i></div>
                <div class="card-label">Customer Portal</div>
                <h2>User <span>Login</span></h2>
                <form th:action="@{/userLogin}" method="post">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="userEmail" placeholder="you@email.com" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="userPassword" placeholder="••••••••" class="form-input" required maxlength="8" minlength="4">
                    </div>
                    <small class="error-msg" th:if="${error2}" th:text="${error2}"></small>
                    <button type="submit" class="btn-login">
                        <i class="fa-solid fa-right-to-bracket"></i> Sign In
                    </button>
                </form>
                <div class="login-footer">
                    Don't have an account? <a href="/register">Register here</a>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
