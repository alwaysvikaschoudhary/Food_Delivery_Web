<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Add User</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/form-page.css}">
</head>
<body>
    <div class="form-page">
        <div class="form-page-card">
            <a href="/admin/services" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <div class="form-header">
                <div class="form-icon"><i class="fa-solid fa-user-plus"></i></div>
                <h2>Add New Customer</h2>
                <p>Register a new user/customer account</p>
            </div>
            <form th:action="@{/addingUser}" method="post">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="uname" placeholder="Enter full name..." class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="uemail" placeholder="user@example.com" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="unumber" pattern="[0-9]{10}" placeholder="10-digit mobile number" class="form-input" required>
                </div>
                <input type="hidden" name="upassword" value="2330">
                <button type="submit" class="btn-submit"><i class="fa-solid fa-plus"></i> Add Customer</button>
            </form>
        </div>
    </div>
</body>
</html>
