<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Add Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/form-page.css}">
</head>
<body>
    <div class="form-page">
        <div class="form-page-card">
            <a href="/admin/services" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <div class="form-header">
                <div class="form-icon"><i class="fa-solid fa-box"></i></div>
                <h2>Add New Product</h2>
                <p>Add a new item to the menu</p>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" style="background-color: #FEE2E2; color: #B91C1C; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                <strong>Error!</strong> <span th:text="${errorMessage}"></span>
            </div>
            <form th:action="@{/products/add}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="pname" placeholder="e.g. Chicken Biryani" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹)</label>
                    <input type="text" name="pprice" placeholder="e.g. 299" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="pdescription" placeholder="Brief description of the product..." class="form-input"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Product Image (Optional)</label>
                    <input type="file" name="image" class="form-input" accept="image/*">
                </div>
                <button type="submit" class="btn-submit"><i class="fa-solid fa-plus"></i> Add Product</button>
            </form>
        </div>
    </div>
</body>
</html>
