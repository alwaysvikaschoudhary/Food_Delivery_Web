<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Order Food</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/BuyProduct.css}">
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="dashboard-page">
        <div class="container">
            <!-- Back link -->
            <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>

            <!-- Welcome Banner -->
            <div class="welcome-banner animate-fadeInUp">
                <div>
                    <h2>Welcome back, <span th:text="${name}">User</span>! 👋</h2>
                    <p>Search for your favorite dishes and place an order.</p>
                </div>
            </div>

            <!-- Search Section -->
            <div class="search-section animate-fadeInUp">
                <h3><i class="fa-solid fa-magnifying-glass"></i> Search Products</h3>
                <form th:action="@{/product/search}" method="post" class="search-row">
                    <input type="text" name="productName" required placeholder="Enter product name..." class="form-input">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-search"></i> Search
                    </button>
                </form>
                <p class="search-msg" th:text="${message}"></p>
            </div>

            <!-- Product Details (shown after search) -->
            <div th:if="${product!=null}" class="product-detail-card animate-fadeInUp">
                <h3><i class="fa-solid fa-box"></i> Product Found — Place Your Order</h3>
                <form th:action="@{/product/order}" th:object="${product}" method="post">
                    <div class="detail-grid">
                        <div class="detail-item">
                            <label>Product Name</label>
                            <input type="text" name="oName" th:value="${product.pname}" readonly>
                        </div>
                        <div class="detail-item">
                            <label>Price (₹)</label>
                            <input type="text" name="oPrice" th:value="${product.pprice}" readonly>
                        </div>
                        <div class="detail-item">
                            <label>Quantity (KG)</label>
                            <input type="number" name="oQuantity" placeholder="Min: 1" min="1" required class="form-input">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full">
                        <i class="fa-solid fa-cart-shopping"></i> Place Order
                    </button>
                </form>
            </div>

            <!-- Orders Table -->
            <div th:if="${orders!=null}" class="orders-section animate-fadeInUp">
                <h3><i class="fa-solid fa-receipt"></i> Your Orders</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price (₹)</th>
                            <th>Qty</th>
                            <th>Total (₹)</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.oName}"></td>
                            <td th:text="${order.oPrice}"></td>
                            <td th:text="${order.oQuantity}"></td>
                            <td><strong th:text="${order.totalAmmout}"></strong></td>
                            <td th:text="${order.orderDate}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
