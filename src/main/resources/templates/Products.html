<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Our Menu</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/Products.css}">
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <!-- Products Hero -->
    <section class="products-hero">
        <div class="container">
            <h1>Our <span class="text-gradient">Delicious</span> Menu</h1>
            <p>Handpicked dishes made with love and the freshest ingredients</p>
        </div>
    </section>

    <!-- Products Grid -->
    <main class="container">
        <div class="products-grid stagger">
            <div class="product-card" th:each="p : ${products}">
                <div class="card-img">
                    <img th:src="${!#strings.isEmpty(p.imageUrl)} ? ${p.imageUrl} : @{'/Images/' + (${p.pname == 'Chicken Biryani' ? 'biryani/Biryani_of_Hyderabadi.jpg' : 
                                   p.pname == 'Paneer Butter Masala' ? 'paneer/paneer-butter-masala.jpg' : 
                                   p.pname == 'Afgani Chicken' ? 'chicken/Afgani-chicken-curry.jpg' : 
                                   p.pname == 'Butter Chicken' ? 'chicken/butter-chicken.jpg' : 
                                   p.pname == 'Laccha Paratha' ? 'north-india-food/Laccha-Paratha.jpg' : 
                                   p.pname == 'Matka Chicken' ? 'chicken/Matka-Chicken.jpg' : 
                                   p.pname == 'Chicken Tikka' ? 'chicken/Tandoori-chicken-tikka.jpg' : 
                                   p.pname == 'Honey Chilli Potato' ? 'north-india-food/Honey-Chilli-Potato.jpg' : 
                                   p.pname == 'Chola Bhatura' ? 'north-india-food/chola-bhatura.jpg' : 
                                   p.pname == 'Gulab Jamun' ? 'north-india-food/Gulab Jamun.jpg' : 
                                   p.pname == 'Veg Chowmein' ? 'chinese/chowmein.jpg' : 
                                   p.pname == 'Paneer Do Pyaza' ? 'paneer/paneer-do-pyaza.jpg' : 'logo.png'})}" 
                         th:alt="${p.pname}">
                    <button class="card-fav"><i class="fa-regular fa-heart"></i></button>
                </div>
                <div class="card-body">
                    <div class="card-rating"><i class="fa-solid fa-star"></i> 4.5</div>
                    <h3 class="card-name" th:text="${p.pname}">Product Name</h3>
                    <p class="card-desc" th:text="${p.pdescription}">Description</p>
                    <div class="card-footer">
                        <div class="card-price">₹<span th:text="${p.pprice}"></span> <span>/ plate</span></div>
                        
                        <!-- Add to Cart Form (Logged in User) -->
                        <div sec:authorize="hasRole('USER')">
                            <form th:action="@{/cart/add}" method="post" style="margin: 0;">
                                <input type="hidden" name="productId" th:value="${p.pid}">
                                <input type="hidden" name="quantity" value="1">
                                <button type="submit" class="btn-add" style="border: none; cursor: pointer; width: 100%;">Add to Cart</button>
                            </form>
                        </div>
                        <!-- Order Now Link (Guest) -->
                        <div sec:authorize="!hasRole('USER')">
                            <a href="/login" class="btn-add">Order Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(products)}" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                <h3>No products available at the moment.</h3>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">🍽️ FoodFrenzy</div>
                <div class="footer-links">
                    <a href="/home">Home</a>
                    <a href="/products">Menu</a>
                    <a href="/about">About</a>
                    <a href="/location">Contact</a>
                </div>
                <div class="footer-copy">© 2026 FoodFrenzy. All Rights Reserved.</div>
            </div>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
    <script>
        // Buy button alert for non-logged-in users (only targeting links, not form buttons)
        document.querySelectorAll('a.btn-add').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                if (confirm('Please Sign In to order. Go to login page?')) {
                    window.location.href = '/login';
                }
            });
        });
    </script>
</body>
</html>
