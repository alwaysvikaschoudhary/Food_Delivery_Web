<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>
    <nav class="navbar" th:fragment="navbar()">
        <div class="nav-inner">
            <a href="/home" class="nav-brand">
                <img th:src="@{/Images/logo.png}" alt="FoodFrenzy Logo">
                <span class="nav-brand-text">FoodFrenzy</span>
            </a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="nav-links">
                <a href="/home"><i class="fa-solid fa-house"></i> Home</a>
                <a href="/products"><i class="fa-solid fa-utensils"></i> Menu</a>
                <a href="/location"><i class="fa-solid fa-location-dot"></i> Locate Us</a>
                <a href="/about"><i class="fa-solid fa-circle-info"></i> About</a>
                
                <!-- Show Cart when authenticated as User -->
                <a sec:authorize="hasRole('USER')" href="/cart" style="position: relative;">
                    <i class="fa-solid fa-cart-shopping"></i> Cart
                    <span id="navCartCount" class="cart-badge" style="display:none; position: absolute; top: -5px; right: -15px; background: var(--primary-color, #E63946); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.75rem; font-weight: bold;">0</span>
                </a>

                <!-- Show Profile/Orders when authenticated as User -->
                <a sec:authorize="hasRole('USER')" href="/order/history">
                    <i class="fa-solid fa-user"></i> Profile
                </a>

                <!-- Show Sign In when NOT authenticated -->
                <a sec:authorize="!isAuthenticated()" href="/login" class="nav-cta">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </a>

                <!-- Show Logout when authenticated -->
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                    <button type="submit" class="nav-cta">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </form>
            </div>
        </div>
        <script sec:authorize="hasRole('USER')">
            function fetchCartCount() {
                fetch('/api/cart/count')
                    .then(res => res.json())
                    .then(data => {
                        const badge = document.getElementById('navCartCount');
                        if (badge && data.cartCount > 0) {
                            badge.innerText = data.cartCount;
                            badge.style.display = 'inline-block';
                        } else if (badge) {
                            badge.style.display = 'none';
                        }
                    })
                    .catch(err => console.error('Error fetching cart count:', err));
            }
            document.addEventListener('DOMContentLoaded', fetchCartCount);
        </script>
    </nav>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
