<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Your Cart</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        .cart-page {
            padding: 120px 0 60px;
            min-height: 80vh;
        }
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 900px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }
        .cart-items {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .item-details h4 {
            margin: 0 0 5px;
            color: var(--text-dark);
        }
        .item-details p {
            margin: 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .item-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .quantity-control form {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn, .remove-btn {
            background: none;
            border: 1px solid var(--gray-300);
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            color: var(--text-dark);
            transition: all 0.2s;
        }
        .qty-btn:hover {
            background: var(--gray-100);
        }
        .remove-btn {
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .remove-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        .cart-summary {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
            height: fit-content;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: var(--text-dark);
        }
        .summary-total {
            border-top: 2px dashed var(--gray-300);
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: #E63946; /* Solid red fallback */
            background: linear-gradient(135deg, var(--primary, #FF6B35), var(--primary-dark, #E55A2B));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .empty-cart {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <main class="cart-page container">
        <h2 style="margin-bottom: 30px;">Your Cart</h2>
        
        <div class="cart-container" th:if="${not #lists.isEmpty(cartItems)}">
            <!-- Cart Items -->
            <div class="cart-items">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--gray-200); text-align: left;">
                            <th style="padding: 10px 0; color: var(--text-dark);">Product</th>
                            <th style="padding: 10px 0; color: var(--text-dark);">Price</th>
                            <th style="padding: 10px 0; color: var(--text-dark); text-align: center;">Quantity</th>
                            <th style="padding: 10px 0; color: var(--text-dark); text-align: center;">Remove</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}" class="cart-item-row" th:data-cart-id="${item.cartItemId}" style="border-bottom: 1px solid var(--gray-200);">
                            <td style="padding: 15px 0; display: flex; align-items: center; gap: 15px;">
                                <img th:src="${!#strings.isEmpty(item.product.imageUrl)} ? ${item.product.imageUrl} : @{'/Images/logo.png'}" alt="Product Image" style="width: 60px; height: 60px; border-radius: 8px; object-fit: cover;">
                                <div>
                                    <h4 th:text="${item.product.pname}" style="margin: 0; color: var(--text-dark);">Product Name</h4>
                                </div>
                            </td>
                            <td style="padding: 15px 0; color: var(--text-dark); font-weight: 600;">
                                ₹<span class="item-price" th:text="${item.product.pprice}">0</span>
                            </td>
                            <td style="padding: 15px 0; text-align: center;">
                                <div class="quantity-control" style="display: inline-flex; align-items: center; border: 1px solid var(--gray-300); border-radius: 4px; overflow: hidden;">
                                    <button type="button" class="qty-btn-minus" style="padding: 5px 10px; background: var(--gray-100); border: none; cursor: pointer; color: var(--text-dark);"><i class="fa-solid fa-minus"></i></button>
                                    <input type="number" class="item-quantity" th:value="${item.quantity}" min="1" max="20" style="width: 40px; padding: 5px; border: none; text-align: center; font-weight: bold; background: white;" readonly>
                                    <button type="button" class="qty-btn-plus" style="padding: 5px 10px; background: var(--gray-100); border: none; cursor: pointer; color: var(--text-dark);"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </td>
                            <td style="padding: 15px 0; text-align: center;">
                                <a th:href="@{/cart/remove/{id}(id=${item.cartItemId})}" class="remove-btn" title="Remove Item"><i class="fa-solid fa-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Cart Summary -->
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>₹<span id="cartSubtotal" th:text="${cartTotal}"></span></span>
                </div>
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span>₹<span id="deliveryFee">50.0</span></span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span>₹<span id="cartGrandTotal" th:text="${cartTotal + 50.0}"></span></span>
                </div>
                <form th:action="@{/order/place}" method="post">
                    <button type="submit" class="btn-checkout">Place Order</button>
                </form>
            </div>
        </div>

        <div class="cart-items empty-cart" th:if="${#lists.isEmpty(cartItems)}">
            <i class="fa-solid fa-cart-arrow-down" style="font-size: 3rem; color: var(--gray-400); margin-bottom: 15px;"></i>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any delicious food yet.</p>
            <a href="/products" class="btn-checkout" style="display: inline-block; width: auto; padding: 10px 30px; text-decoration: none;">Browse Menu</a>
        </div>
    </main>

    <!-- CSRF Token for JS -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script th:src="@{/js/app.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

            document.querySelectorAll('.cart-item-row').forEach(row => {
                const cartItemId = row.getAttribute('data-cart-id');
                const btnMinus = row.querySelector('.qty-btn-minus');
                const btnPlus = row.querySelector('.qty-btn-plus');
                const inputQty = row.querySelector('.item-quantity');

                const updateCart = (newQty) => {
                    const formData = new FormData();
                    formData.append('quantity', newQty);

                    fetch(`/api/cart/update/${cartItemId}`, {
                        method: 'POST',
                        headers: {
                            [csrfHeader]: csrfToken
                        },
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.status === 'success') {
                            inputQty.value = newQty;
                            document.getElementById('cartSubtotal').innerText = data.cartTotal;
                            document.getElementById('cartGrandTotal').innerText = data.cartTotal + 50.0;
                            if (typeof fetchCartCount === 'function') fetchCartCount();
                        }
                    })
                    .catch(err => console.error(err));
                };

                btnMinus.addEventListener('click', () => {
                    let currentQty = parseInt(inputQty.value);
                    if(currentQty > 1) {
                        updateCart(currentQty - 1);
                    }
                });

                btnPlus.addEventListener('click', () => {
                    let currentQty = parseInt(inputQty.value);
                    if(currentQty < 20) {
                        updateCart(currentQty + 1);
                    }
                });
            });
        });
    </script>
</body>
</html>
