<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Error</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: var(--space-lg);
        }
        .error-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: var(--space-3xl) var(--space-2xl);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 0.6s var(--ease) forwards;
        }
        .error-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #B91C1C);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-xl);
        }
        .error-icon i { font-size: 2rem; color: #fff; }
        .error-card h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: var(--space-sm); }
        .error-card .error-subtitle { color: var(--text-secondary); font-size: 1rem; margin-bottom: var(--space-md); }
        .error-card .error-details {
            background: #FEF2F2;
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-xl);
            font-size: 0.88rem;
            color: var(--accent);
            line-height: 1.7;
            text-align: left;
        }
        .error-actions { display: flex; gap: var(--space-md); justify-content: center; }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h1>Oops! Something went wrong</h1>
            <p class="error-subtitle">An unexpected error occurred while processing your request.</p>
            <div class="error-details">
                <strong>Possible reasons:</strong><br>
                1. You may be trying to add null/invalid data.<br>
                2. The email may already be registered.<br>
                3. A required field was left empty.
            </div>
            <div class="error-actions">
                <a href="/admin/services" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
                <a href="https://www.google.com" target="_blank" class="btn btn-secondary"><i class="fa-solid fa-circle-question"></i> Get Help</a>
            </div>
        </div>
    </div>
</body>
</html>
