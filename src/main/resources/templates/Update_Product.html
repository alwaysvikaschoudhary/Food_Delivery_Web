<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Update Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/form-page.css}">
</head>
<body>
    <div class="form-page">
        <div class="form-page-card">
            <a href="/admin/services" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <div class="form-header">
                <div class="form-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                <h2>Update Product</h2>
                <p>Edit the product details below</p>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" style="background-color: #FEE2E2; color: #B91C1C; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                <strong>Error!</strong> <span th:text="${errorMessage}"></span>
            </div>
            
            <form th:action="@{'/updatingProduct/'+${product.pid}}" method="post" enctype="multipart/form-data" th:object="${product}">
                <input type="hidden" th:value="${product.pid}">
                <div class="form-group">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="pname" th:value="${product.pname}" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Price (₹)</label>
                    <input type="text" name="pprice" th:value="${product.pprice}" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="pdescription" class="form-input" th:text="${product.pdescription}"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Product Image (Optional)</label>
                    <input type="file" name="image" class="form-input" accept="image/*">
                </div>
                <button type="submit" class="btn-submit"><i class="fa-solid fa-check"></i> Update Product</button>
            </form>
        </div>
    </div>
</body>
</html>
