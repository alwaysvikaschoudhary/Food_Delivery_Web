<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodFrenzy — Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/Admin_Page.css}">
</head>
<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="admin-page">
        <div class="container">
            <!-- Header -->
            <div class="admin-header">
                <div>
                    <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
                    <h1>Admin Dashboard</h1>
                </div>
                <div class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin Panel</div>
            </div>

            <!-- Admins Section -->
            <div class="admin-section animate-fadeInUp">
                <div class="admin-section-header">
                    <h2><i class="fa-solid fa-user-tie"></i> Admins</h2>
                    <a th:href="@{/addAdmin}" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Add Admin</a>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="admin : ${admins}">
                            <td th:text="${admin.adminId}"></td>
                            <td th:text="${admin.adminName}"></td>
                            <td th:text="${admin.adminEmail}"></td>
                            <td th:text="${admin.adminNumber}"></td>
                            <td>
                                <a th:href="@{'/updateAdmin/'+${admin.adminId}}" class="action-btn edit" title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <a th:href="@{'/deleteAdmin/'+${admin.adminId}}" class="action-btn delete" title="Delete">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Users Section -->
            <div class="admin-section animate-fadeInUp" th:object="${userObject}">
                <div class="admin-section-header">
                    <h2><i class="fa-solid fa-users"></i> Users</h2>
                    <a th:href="@{/addUser}" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Add User</a>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.u_id}"></td>
                            <td th:text="${user.uname}"></td>
                            <td th:text="${user.uemail}"></td>
                            <td th:text="${user.unumber}"></td>
                            <td>
                                <a th:href="@{'/updateUser/'+${user.u_id}}" class="action-btn edit" title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <a th:href="@{'/deleteUser/'+${user.u_id}}" class="action-btn delete" title="Delete">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Products Section -->
            <div class="admin-section animate-fadeInUp">
                <div class="admin-section-header">
                    <h2><i class="fa-solid fa-box"></i> Products</h2>
                    <a th:href="@{/addProduct}" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Add Product</a>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Price (₹)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.pid}"></td>
                            <td th:text="${product.pname}"></td>
                            <td th:text="${product.pprice}"></td>
                            <td>
                                <a th:href="@{'/updateProduct/'+${product.pid}}" class="action-btn edit" title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <a th:href="@{'/deleteProduct/'+${product.pid}}" class="action-btn delete" title="Delete">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Orders Section -->
            <div class="admin-section animate-fadeInUp">
                <div class="admin-section-header">
                    <h2><i class="fa-solid fa-receipt"></i> All Orders</h2>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Product</th>
                            <th>Price (₹)</th>
                            <th>Qty</th>
                            <th>Total (₹)</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.user.uname}"></td>
                            <td th:text="${order.user.uemail}"></td>
                            <td th:text="${order.oName}"></td>
                            <td th:text="${order.oPrice}"></td>
                            <td th:text="${order.oQuantity}"></td>
                            <td><strong th:text="${order.totalAmmout}"></strong></td>
                            <td th:text="${order.orderDate}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
